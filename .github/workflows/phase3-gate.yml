name: Phase 3 Gate

on:
  pull_request:
    paths:
      - 'src/lib/ingest/languages/**'
      - 'src/lib/modify/**'
      - 'src/lib/drift/**'
      - 'src/lib/orchestrator/**'
      - 'src/lib/policy/**'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase3-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
