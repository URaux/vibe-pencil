name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (src + non-e2e tests)
        run: npx tsc -p tsconfig.ci.json --noEmit

      - name: Unit + integration tests (excludes known-broken, e2e, real-repo verify)
        run: npx vitest run --config=vitest.ci.config.ts
